# MediaMTX configuration for the GHOST scene stream.
# Unity (or tools/test_stream.sh) pushes H.264 over RTSP to :8554/scene;
# operator consoles pull it over WebRTC via WHEP at :8889/scene/whep.
# Unset options keep MediaMTX defaults.

logLevel: info

api: no
metrics: no
playback: no

rtsp: yes
rtspTransports: [tcp]
rtspAddress: :8554

rtmp: no
hls: no
srt: no
moq: no

webrtc: yes
webrtcAddress: :8889
# Self-signed TLS for the LAN (generate with gen_certs.sh). Browsers must
# trust the cert once: visit https://<server>:8889 and accept the warning.
webrtcEncryption: yes
webrtcServerKey: certs/server.key
webrtcServerCert: certs/server.crt
webrtcLocalUDPAddress: :8189

paths:
  scene:
    source: publisher
